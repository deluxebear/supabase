name: Backup Operator CI

on:
  pull_request:
    paths:
      - apps/backup-operator/**
      - .github/workflows/backup-operator-ci.yml
  push:
    branches: [master, main, custom/main]
    paths:
      - apps/backup-operator/**
      - .github/workflows/backup-operator-ci.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backup-operator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/backup-operator/go.mod
          cache-dependency-path: apps/backup-operator/go.sum
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./cmd/backup-operator ./cmd/backupctl
      - run: go run github.com/bufbuild/buf/cmd/buf@v1.50.0 lint
      - run: ./scripts/check-generated.sh
